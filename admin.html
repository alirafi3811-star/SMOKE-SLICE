<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Portal Vault | Smoke & Slice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <script type="module" src="admin.js"></script>
</head>
<body>

  <div id="authGateSection" class="auth-gate-wrapper">
    <div class="login-card">
      <img src="logo.jpg" alt="Logo" class="login-logo">
      <h2>Speakeasy Control Vault</h2>
      <p>Authorized personnel operations environment access gate.</p>
      <form id="adminLoginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="authEmail" required placeholder="manager@smokeslice.com">
        </div>
        <div class="form-group">
          <label>Secret Vault Password</label>
          <input type="password" id="authPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-red btn-block">Unlock Dashboard</button>
      </form>
    </div>
  </div>

  <div id="adminPanelDashboard" class="admin-dashboard-layout hidden">
    <aside class="sidebar-navigation">
      <div class="sidebar-brand">
        <img src="logo.jpg" alt="Logo">
        <span>S&S Admin</span>
      </div>
      <div class="metrics-widget">
        <div class="metric-label">Total Vault Revenue</div>
        <div class="metric-value" id="revenueMetricDisplay">€0.00</div>
      </div>
      <button id="logoutBtn" class="btn btn-outline btn-block btn-sm" style="margin-top:auto;">Lock Portal</button>
    </aside>

    <main class="dashboard-workspace">
      <header class="workspace-header">
        <h2>Live Operations Dashboard Stream</h2>
        <div class="filter-controls">
          <select id="statusFilterDropdown">
            <option value="all">Display All Operations</option>
            <option value="placed">Placed / Unprocessed</option>
            <option value="received">Accepted Operations</option>
            <option value="preparing">Active Cooking Processes</option>
            <option value="ready">Packaged & Ready</option>
            <option value="out_for_delivery">Out for Delivery</option>
            <option value="completed">Archive Completed</option>
            <option value="cancelled">Cancelled Transactions</option>
          </select>
        </div>
      </header>

      <div class="orders-feed-stream" id="ordersFeedStream">
        </div>
    </main>
  </div>

</body>
</html>
